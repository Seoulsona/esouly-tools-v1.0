<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Age Calculator — eSouly Tools</title>
    <link rel="stylesheet" href="../assets/css/main.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="light">
<header class="header"><div class="header-inner"><a href="/" class="logo">e<span>S</span>ouly <small>Tools</small></a><div class="header-right"><button class="theme-btn" onclick="toggleTheme()"><svg class="icon-moon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg><svg class="icon-sun" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/></svg></button></div></div></header>
<main class="tool-page">
    <div class="tool-page-header">
        <a href="/" class="back-btn">← Back to Tools</a>
        <h1 class="tool-page-title">🎂 Age Calculator</h1>
        <p class="tool-page-desc">Calculate your exact age in years, months, days, hours and more.</p>
    </div>
    <div class="tool-box">
        <div style="margin-bottom:16px">
            <label style="font-size:13px;font-weight:600;color:var(--text);display:block;margin-bottom:6px">Date of Birth</label>
            <input type="date" class="tool-input" id="dob">
        </div>
        <div style="margin-bottom:16px">
            <label style="font-size:13px;font-weight:600;color:var(--text);display:block;margin-bottom:6px">Calculate age as of</label>
            <input type="date" class="tool-input" id="targetDate">
        </div>
        <button class="btn btn-primary" onclick="calcAge()">Calculate Age</button>
    </div>
    <div class="tool-box" id="resultBox" style="display:none">
        <div class="stats-row">
            <div class="stat-box"><div class="stat-num" id="years">0</div><div class="stat-label">Years</div></div>
            <div class="stat-box"><div class="stat-num" id="months">0</div><div class="stat-label">Months</div></div>
            <div class="stat-box"><div class="stat-num" id="days">0</div><div class="stat-label">Days</div></div>
        </div>
        <div class="stats-row" style="margin-top:8px">
            <div class="stat-box"><div class="stat-num" id="totalDays">0</div><div class="stat-label">Total Days</div></div>
            <div class="stat-box"><div class="stat-num" id="totalHours">0</div><div class="stat-label">Total Hours</div></div>
            <div class="stat-box"><div class="stat-num" id="nextBday">0</div><div class="stat-label">Days to Birthday</div></div>
        </div>
    </div>
</main>
<footer class="footer"><div class="footer-inner"><a href="/" class="footer-logo">e<span>S</span>ouly <small>Tools</small></a><div class="footer-links"><a href="../contact.html">Contact</a><span>·</span><a href="../privacy.html">Privacy Policy</a><span>·</span><a href="../terms.html">Terms & Conditions</a></div><p class="footer-copy">© 2026 eSouly. All rights reserved.</p></div></footer>
<script src="../assets/js/main.js"></script>
<script>
// Set default target date to today
document.getElementById('targetDate').valueAsDate = new Date();
function calcAge(){
    const dob = new Date(document.getElementById('dob').value);
    const target = new Date(document.getElementById('targetDate').value);
    if(!dob||isNaN(dob)) return alert('Please enter a valid birth date');
    if(dob>target) return alert('Birth date cannot be in the future');
    let y=target.getFullYear()-dob.getFullYear();
    let m=target.getMonth()-dob.getMonth();
    let d=target.getDate()-dob.getDate();
    if(d<0){m--;d+=new Date(target.getFullYear(),target.getMonth(),0).getDate()}
    if(m<0){y--;m+=12}
    const totalDays = Math.floor((target-dob)/(1000*60*60*24));
    // Next birthday
    let nextBday = new Date(target.getFullYear(), dob.getMonth(), dob.getDate());
    if(nextBday<=target) nextBday.setFullYear(nextBday.getFullYear()+1);
    const daysToNext = Math.floor((nextBday-target)/(1000*60*60*24));
    document.getElementById('years').textContent = y;
    document.getElementById('months').textContent = m;
    document.getElementById('days').textContent = d;
    document.getElementById('totalDays').textContent = totalDays.toLocaleString();
    document.getElementById('totalHours').textContent = (totalDays*24).toLocaleString();
    document.getElementById('nextBday').textContent = daysToNext;
    document.getElementById('resultBox').style.display = 'block';
}
</script>
</body></html>
