<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lorem Ipsum Generator — eSouly Tools</title>
    <link rel="stylesheet" href="../assets/css/main.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="light">
<header class="header"><div class="header-inner"><a href="/" class="logo">e<span>S</span>ouly <small>Tools</small></a><div class="header-right"><button class="theme-btn" onclick="toggleTheme()"><svg class="icon-moon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg><svg class="icon-sun" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/></svg></button></div></div></header>
<main class="tool-page">
    <div class="tool-page-header">
        <a href="/" class="back-btn">← Back to Tools</a>
        <h1 class="tool-page-title">📄 Lorem Ipsum Generator</h1>
        <p class="tool-page-desc">Generate placeholder text for your designs and mockups.</p>
    </div>
    <div class="tool-box">
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px">
            <div>
                <label style="font-size:13px;font-weight:600;color:var(--text);display:block;margin-bottom:6px">Generate</label>
                <select class="tool-input" id="type">
                    <option value="paragraphs">Paragraphs</option>
                    <option value="sentences">Sentences</option>
                    <option value="words">Words</option>
                </select>
            </div>
            <div>
                <label style="font-size:13px;font-weight:600;color:var(--text);display:block;margin-bottom:6px">Amount</label>
                <input type="number" class="tool-input" id="amount" value="3" min="1" max="50">
            </div>
        </div>
        <label class="checkbox-row" style="margin-bottom:16px"><input type="checkbox" id="startLorem" checked> Start with "Lorem ipsum..."</label>
        <button class="btn btn-primary" onclick="generate()">Generate</button>
    </div>
    <div class="tool-box" id="resultBox" style="display:none">
        <h3>Generated Text</h3>
        <div id="result" style="font-size:14px;color:var(--text2);line-height:1.8"></div>
        <div class="btn-group" style="margin-top:12px">
            <button class="btn btn-primary" onclick="copyText(document.getElementById('result').innerText)">Copy Text</button>
            <button class="btn btn-secondary" onclick="generate()">🔄 Regenerate</button>
        </div>
    </div>
</main>
<footer class="footer"><div class="footer-inner"><a href="/" class="footer-logo">e<span>S</span>ouly <small>Tools</small></a><div class="footer-links"><a href="../contact.html">Contact</a><span>·</span><a href="../privacy.html">Privacy Policy</a><span>·</span><a href="../terms.html">Terms & Conditions</a></div><p class="footer-copy">© 2026 eSouly. All rights reserved.</p></div></footer>
<script src="../assets/js/main.js"></script>
<script>
const words = ['lorem','ipsum','dolor','sit','amet','consectetur','adipiscing','elit','sed','do','eiusmod','tempor','incididunt','ut','labore','et','dolore','magna','aliqua','enim','ad','minim','veniam','quis','nostrud','exercitation','ullamco','laboris','nisi','aliquip','ex','ea','commodo','consequat','duis','aute','irure','in','reprehenderit','voluptate','velit','esse','cillum','eu','fugiat','nulla','pariatur','excepteur','sint','occaecat','cupidatat','non','proident','sunt','culpa','qui','officia','deserunt','mollit','anim','id','est','laborum'];
function randWords(n){ return Array.from({length:n},()=>words[Math.floor(Math.random()*words.length)]).join(' '); }
function randSentence(){ const n=Math.floor(Math.random()*10)+8; let s=randWords(n); return s.charAt(0).toUpperCase()+s.slice(1)+'.'; }
function randParagraph(){ return Array.from({length:Math.floor(Math.random()*4)+4},()=>randSentence()).join(' '); }
function generate(){
    const type = document.getElementById('type').value;
    const amount = Math.min(50, parseInt(document.getElementById('amount').value)||1);
    const startLorem = document.getElementById('startLorem').checked;
    let result = '';
    const loremStart = 'Lorem ipsum dolor sit amet, consectetur adipiscing elit, sed do eiusmod tempor incididunt ut labore et dolore magna aliqua.';
    if(type==='paragraphs'){
        const paras = Array.from({length:amount},(_,i)=> i===0&&startLorem ? loremStart+' '+randParagraph() : randParagraph());
        result = paras.map(p=>`<p style="margin-bottom:12px">${p}</p>`).join('');
    } else if(type==='sentences'){
        const sentences = Array.from({length:amount},(_,i)=> i===0&&startLorem ? loremStart : randSentence());
        result = sentences.join(' ');
    } else {
        let w = randWords(amount);
        if(startLorem) w = 'lorem ipsum dolor sit amet ' + w;
        result = w;
    }
    document.getElementById('result').innerHTML = result;
    document.getElementById('resultBox').style.display = 'block';
}
</script>
</body></html>
