<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Resizer — eSouly Tools</title>
    <link rel="stylesheet" href="../assets/css/main.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="light">
<header class="header"><div class="header-inner">
    <a href="/" class="logo">e<span>S</span>ouly <small>Tools</small></a>
    <div class="header-right" id="headerRight">
        <button class="theme-btn" onclick="toggleTheme()">
            <svg class="icon-moon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
            <svg class="icon-sun" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
        </button>
    </div>
</div></header>
<main class="tool-page">
    <div class="tool-page-header">
        <a href="/" class="back-btn" data-i18n="back_to_tools">← Back to Tools</a>
        <h1 class="tool-page-title">📐 Image Resizer</h1>
        <p class="tool-page-desc">Resize images to any dimension.</p>
    </div>
    <div class="tool-box">
        <div class="drop-zone" id="dropZone" onclick="document.getElementById('fileInput').click()" ondrop="handleDrop(event)" ondragover="event.preventDefault()">
            <div style="font-size:48px;margin-bottom:12px">📐</div>
            <p style="font-weight:600;margin-bottom:4px">Click to select or drag & drop image</p>
            <p style="font-size:12px;color:var(--text2)">Supports JPG, PNG, WebP, GIF</p>
            <input type="file" id="fileInput" accept="image/*" style="display:none" onchange="loadImage(event)">
        </div>
    </div>
    <div class="tool-box" id="settingsBox" style="display:none">
        <h3>Resize Settings</h3>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px">
            <div>
                <label style="font-size:13px;font-weight:600;display:block;margin-bottom:6px">Width (px):</label>
                <input class="tool-input" type="number" id="newW" oninput="updateHeight()">
            </div>
            <div>
                <label style="font-size:13px;font-weight:600;display:block;margin-bottom:6px">Height (px):</label>
                <input class="tool-input" type="number" id="newH" oninput="updateWidth()">
            </div>
        </div>
        <label style="display:flex;align-items:center;gap:8px;font-size:13px;cursor:pointer;margin-bottom:16px">
            <input type="checkbox" id="lockRatio" checked> Lock aspect ratio
        </label>
        <button class="btn btn-primary" onclick="resizeImage()">Resize & Download</button>
    </div>
    <canvas id="canvas" style="display:none"></canvas>
</main>
<footer class="footer"><div class="footer-inner">
    <a href="/" class="footer-logo">e<span>S</span>ouly <small>Tools</small></a>
    <div class="footer-links">
        <a href="../contact.html" data-i18n="footer_contact">Contact</a>
        <span>·</span>
        <a href="../privacy.html" data-i18n="footer_privacy">Privacy Policy</a>
        <span>·</span>
        <a href="../terms.html" data-i18n="footer_terms">Terms & Conditions</a>
    </div>
    <p class="footer-copy">© 2026 eSouly. All rights reserved.</p>
</div></footer>
<script src="../assets/js/main.js"></script>
<script src="../assets/js/tool-header.js"></script>
<script src="../assets/js/i18n.js"></script>
<script>
let img, origW, origH;
function handleDrop(e){ e.preventDefault(); const f=e.dataTransfer.files[0]; if(f && f.type.startsWith('image/')) loadFile(f); }
function loadImage(e){ loadFile(e.target.files[0]); }
function loadFile(file){
    origFilename = file.name;
    const reader = new FileReader();
    reader.onload = e => {
        img = new Image();
        img.onload = () => {
            origW=img.width; origH=img.height;
            document.getElementById('newW').value=origW;
            document.getElementById('newH').value=origH;
            document.getElementById('settingsBox').style.display='block';
        };
        img.src = e.target.result;
    };
    reader.readAsDataURL(file);
}
let updating=false;
function updateHeight(){
    if(updating||!document.getElementById('lockRatio').checked) return;
    updating=true;
    const w=parseInt(document.getElementById('newW').value)||origW;
    document.getElementById('newH').value=Math.round(w*origH/origW);
    updating=false;
}
function updateWidth(){
    if(updating||!document.getElementById('lockRatio').checked) return;
    updating=true;
    const h=parseInt(document.getElementById('newH').value)||origH;
    document.getElementById('newW').value=Math.round(h*origW/origH);
    updating=false;
}
let origFilename='image';
function resizeImage(){
    const w=parseInt(document.getElementById('newW').value), h=parseInt(document.getElementById('newH').value);
    if(!w||!h) return;
    const canvas=document.getElementById('canvas');
    canvas.width=w; canvas.height=h;
    canvas.getContext('2d').drawImage(img,0,0,w,h);
    canvas.toBlob(blob => downloadFile(blob,'resized_'+origFilename.replace(/\.[^.]+$/,'')+'.png'),'image/png');
}
</script>
</body></html>
