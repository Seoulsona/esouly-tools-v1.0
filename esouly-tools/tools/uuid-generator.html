<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UUID Generator — eSouly Tools</title>
    <link rel="stylesheet" href="../assets/css/main.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="light">
<header class="header"><div class="header-inner"><a href="/" class="logo">e<span>S</span>ouly <small>Tools</small></a><div class="header-right"><button class="theme-btn" onclick="toggleTheme()"><svg class="icon-moon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg><svg class="icon-sun" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/></svg></button></div></div></header>
<main class="tool-page">
    <div class="tool-page-header">
        <a href="/" class="back-btn">← Back to Tools</a>
        <h1 class="tool-page-title">🆔 UUID Generator</h1>
        <p class="tool-page-desc">Generate unique UUIDs (v4) instantly.</p>
    </div>
    <div class="tool-box">
        <div style="margin-bottom:16px">
            <label style="font-size:13px;font-weight:600;color:var(--text);display:block;margin-bottom:6px">How many UUIDs:</label>
            <select class="tool-input" id="count" style="width:120px">
                <option>1</option><option>5</option><option>10</option><option>25</option><option>50</option>
            </select>
        </div>
        <button class="btn btn-primary" onclick="generate()">Generate UUIDs</button>
    </div>
    <div class="tool-box" id="resultBox" style="display:none">
        <h3>Generated UUIDs</h3>
        <div id="uuids" style="display:flex;flex-direction:column;gap:6px;margin-bottom:12px"></div>
        <div class="btn-group">
            <button class="btn btn-secondary" onclick="copyAll()">Copy All</button>
            <button class="btn btn-secondary" onclick="generate()">🔄 Regenerate</button>
        </div>
    </div>
</main>
<footer class="footer"><div class="footer-inner"><a href="/" class="footer-logo">e<span>S</span>ouly <small>Tools</small></a><div class="footer-links"><a href="../contact.html">Contact</a><span>·</span><a href="../privacy.html">Privacy Policy</a><span>·</span><a href="../terms.html">Terms & Conditions</a></div><p class="footer-copy">© 2026 eSouly. All rights reserved.</p></div></footer>
<script src="../assets/js/main.js"></script>
<script>
function uuid(){ return crypto.randomUUID ? crypto.randomUUID() : 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g,c=>{const r=Math.random()*16|0;return(c==='x'?r:r&0x3|0x8).toString(16)}); }
let generated = [];
function generate(){
    const count = parseInt(document.getElementById('count').value);
    generated = Array.from({length:count},()=>uuid());
    document.getElementById('uuids').innerHTML = generated.map(u=>`
        <div style="display:flex;align-items:center;gap:8px;background:var(--bg2);padding:8px 12px;border-radius:6px;border:1px solid var(--border)">
            <code style="flex:1;font-size:13px;color:var(--text);font-family:monospace">${u}</code>
            <button class="btn btn-secondary" style="padding:4px 10px;font-size:11px" onclick="copyText('${u}')">Copy</button>
        </div>
    `).join('');
    document.getElementById('resultBox').style.display='block';
}
function copyAll(){ copyText(generated.join('\n')); }
</script>
</body></html>
