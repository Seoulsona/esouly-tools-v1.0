<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>URL Encoder/Decoder — eSouly Tools</title>
    <link rel="stylesheet" href="../assets/css/main.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="light">
<header class="header"><div class="header-inner"><a href="/" class="logo">e<span>S</span>ouly <small>Tools</small></a><div class="header-right"><button class="theme-btn" onclick="toggleTheme()"><svg class="icon-moon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg><svg class="icon-sun" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/></svg></button></div></div></header>
<main class="tool-page">
    <div class="tool-page-header">
        <a href="/" class="back-btn">← Back to Tools</a>
        <h1 class="tool-page-title">🔗 URL Encoder/Decoder</h1>
        <p class="tool-page-desc">Encode and decode URLs instantly.</p>
    </div>
    <div class="tool-box">
        <h3>Input</h3>
        <textarea class="tool-input" id="input" placeholder="Enter URL or text to encode/decode..." style="min-height:120px"></textarea>
        <div class="btn-group">
            <button class="btn btn-primary" onclick="encode()">Encode URL</button>
            <button class="btn btn-secondary" onclick="decode()">Decode URL</button>
            <button class="btn btn-secondary" onclick="document.getElementById('input').value='';document.getElementById('output').value=''">Clear</button>
        </div>
    </div>
    <div class="tool-box">
        <h3>Output</h3>
        <textarea class="tool-input" id="output" readonly style="min-height:120px"></textarea>
        <div class="btn-group">
            <button class="btn btn-secondary" onclick="copyText(document.getElementById('output').value)">Copy Result</button>
            <button class="btn btn-secondary" onclick="document.getElementById('input').value=document.getElementById('output').value;document.getElementById('output').value=''">Use as Input</button>
        </div>
    </div>
</main>
<footer class="footer"><div class="footer-inner"><a href="/" class="footer-logo">e<span>S</span>ouly <small>Tools</small></a><div class="footer-links"><a href="../contact.html">Contact</a><span>·</span><a href="../privacy.html">Privacy Policy</a><span>·</span><a href="../terms.html">Terms & Conditions</a></div><p class="footer-copy">© 2026 eSouly. All rights reserved.</p></div></footer>
<script src="../assets/js/main.js"></script>
<script>
function encode(){ document.getElementById('output').value = encodeURIComponent(document.getElementById('input').value); }
function decode(){ try{ document.getElementById('output').value = decodeURIComponent(document.getElementById('input').value); }catch(e){ document.getElementById('output').value = 'Invalid URL encoding'; } }
</script>
</body></html>
