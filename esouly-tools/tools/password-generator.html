<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Generator — eSouly Tools</title>
    <link rel="stylesheet" href="../assets/css/main.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="light">
<header class="header"><div class="header-inner"><a href="/" class="logo">e<span>S</span>ouly <small>Tools</small></a><div class="header-right"><button class="theme-btn" onclick="toggleTheme()"><svg class="icon-moon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg><svg class="icon-sun" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/></svg></button></div></div></header>
<main class="tool-page">
    <div class="tool-page-header">
        <a href="/" class="back-btn">← Back to Tools</a>
        <h1 class="tool-page-title">🔑 Password Generator</h1>
        <p class="tool-page-desc">Generate strong, secure and random passwords instantly.</p>
    </div>
    <div class="tool-box">
        <div style="margin-bottom:16px">
            <label style="font-size:14px;font-weight:600;color:var(--text);display:block;margin-bottom:8px">Password Length: <span id="lenVal">16</span></label>
            <input type="range" class="range-input" id="lengthRange" min="6" max="64" value="16" oninput="document.getElementById('lenVal').textContent=this.value">
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px">
            <label class="checkbox-row"><input type="checkbox" id="upper" checked> Uppercase (A-Z)</label>
            <label class="checkbox-row"><input type="checkbox" id="lower" checked> Lowercase (a-z)</label>
            <label class="checkbox-row"><input type="checkbox" id="numbers" checked> Numbers (0-9)</label>
            <label class="checkbox-row"><input type="checkbox" id="symbols" checked> Symbols (!@#$)</label>
        </div>
        <div style="margin-bottom:12px">
            <label style="font-size:13px;color:var(--text3);display:block;margin-bottom:6px">How many passwords:</label>
            <select class="tool-input" id="count" style="width:120px">
                <option>1</option><option>5</option><option>10</option><option>20</option>
            </select>
        </div>
        <button class="btn btn-primary" onclick="generate()">Generate Passwords</button>
    </div>
    <div class="tool-box" id="resultBox" style="display:none">
        <h3>Generated Passwords</h3>
        <div id="passwords" style="display:flex;flex-direction:column;gap:8px;margin-bottom:12px"></div>
        <button class="btn btn-secondary" onclick="generate()">🔄 Regenerate</button>
    </div>
</main>
<footer class="footer"><div class="footer-inner"><a href="/" class="footer-logo">e<span>S</span>ouly <small>Tools</small></a><div class="footer-links"><a href="../contact.html">Contact</a><span>·</span><a href="../privacy.html">Privacy Policy</a><span>·</span><a href="../terms.html">Terms & Conditions</a></div><p class="footer-copy">© 2026 eSouly. All rights reserved.</p></div></footer>
<script src="../assets/js/main.js"></script>
<script>
function generate(){
    const len = parseInt(document.getElementById('lengthRange').value);
    const count = parseInt(document.getElementById('count').value);
    let chars = '';
    if(document.getElementById('upper').checked) chars += 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
    if(document.getElementById('lower').checked) chars += 'abcdefghijklmnopqrstuvwxyz';
    if(document.getElementById('numbers').checked) chars += '0123456789';
    if(document.getElementById('symbols').checked) chars += '!@#$%^&*()_+-=[]{}|;:,.<>?';
    if(!chars){ alert('Select at least one character type!'); return; }
    const passwords = [];
    for(let i=0;i<count;i++){
        let p = '';
        for(let j=0;j<len;j++) p += chars[Math.floor(Math.random()*chars.length)];
        passwords.push(p);
    }
    const container = document.getElementById('passwords');
    container.innerHTML = passwords.map(p => `
        <div style="display:flex;align-items:center;gap:8px;background:var(--bg2);padding:10px 12px;border-radius:8px;border:1px solid var(--border)">
            <code style="flex:1;font-size:14px;color:var(--text);word-break:break-all">${p}</code>
            <button class="btn btn-secondary" style="padding:6px 12px;font-size:12px;flex-shrink:0" onclick="copyText('${p}')">Copy</button>
        </div>
    `).join('');
    document.getElementById('resultBox').style.display = 'block';
}
</script>
</body></html>
