<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Duplicate Line Remover — eSouly Tools</title>
    <link rel="stylesheet" href="../assets/css/main.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="light">
<header class="header"><div class="header-inner">
    <a href="/" class="logo">e<span>S</span>ouly <small>Tools</small></a>
    <div class="header-right" id="headerRight">
        <button class="theme-btn" onclick="toggleTheme()">
            <svg class="icon-moon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
            <svg class="icon-sun" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
        </button>
    </div>
</div></header>
<main class="tool-page">
    <div class="tool-page-header">
        <a href="/" class="back-btn" data-i18n="back_to_tools">← Back to Tools</a>
        <h1 class="tool-page-title">🧹 Duplicate Line Remover</h1>
        <p class="tool-page-desc">Remove duplicate lines from your text.</p>
    </div>
    <div class="tool-box">
        <textarea class="tool-input" id="input" rows="8" placeholder="Paste your text here (one item per line)..."></textarea>
        <div style="margin:12px 0;display:flex;gap:16px;align-items:center;flex-wrap:wrap">
            <label style="display:flex;align-items:center;gap:6px;font-size:13px;cursor:pointer">
                <input type="checkbox" id="caseSensitive"> Case sensitive
            </label>
            <label style="display:flex;align-items:center;gap:6px;font-size:13px;cursor:pointer">
                <input type="checkbox" id="trimLines" checked> Trim whitespace
            </label>
        </div>
        <div class="btn-group">
            <button class="btn btn-primary" onclick="removeDupes()">Remove Duplicates</button>
            <button class="btn btn-secondary" onclick="clearAll()">Clear</button>
        </div>
    </div>
    <div class="tool-box" id="resultBox" style="display:none">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
            <h3 style="margin:0">Result</h3>
            <span id="stats" style="font-size:12px;color:var(--text2)"></span>
        </div>
        <textarea class="tool-input" id="output" rows="8" readonly></textarea>
        <button class="btn btn-secondary" style="margin-top:10px" onclick="copyText(document.getElementById('output').value)">Copy Result</button>
    </div>
</main>
<footer class="footer"><div class="footer-inner">
    <a href="/" class="footer-logo">e<span>S</span>ouly <small>Tools</small></a>
    <div class="footer-links">
        <a href="../contact.html" data-i18n="footer_contact">Contact</a>
        <span>·</span>
        <a href="../privacy.html" data-i18n="footer_privacy">Privacy Policy</a>
        <span>·</span>
        <a href="../terms.html" data-i18n="footer_terms">Terms & Conditions</a>
    </div>
    <p class="footer-copy">© 2026 eSouly. All rights reserved.</p>
</div></footer>
<script src="../assets/js/main.js"></script>
<script src="../assets/js/tool-header.js"></script>
<script src="../assets/js/i18n.js"></script>
<script>
function removeDupes(){
    const input = document.getElementById('input').value;
    if(!input.trim()) return;
    const caseSens = document.getElementById('caseSensitive').checked;
    const trim = document.getElementById('trimLines').checked;
    const lines = input.split('\n');
    const seen = new Set();
    const result = lines.filter(line => {
        const key = trim ? (caseSens ? line.trim() : line.trim().toLowerCase()) : (caseSens ? line : line.toLowerCase());
        if(seen.has(key)) return false;
        seen.add(key);
        return true;
    });
    document.getElementById('output').value = result.join('\n');
    document.getElementById('stats').textContent = `${lines.length} lines → ${result.length} unique (${lines.length - result.length} removed)`;
    document.getElementById('resultBox').style.display='block';
}
function clearAll(){ document.getElementById('input').value=''; document.getElementById('resultBox').style.display='none'; }
</script>
</body></html>
