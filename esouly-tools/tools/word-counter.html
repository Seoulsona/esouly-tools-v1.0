<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Word Counter — eSouly Tools</title>
    <link rel="stylesheet" href="../assets/css/main.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="light">
<header class="header">
    <div class="header-inner">
        <a href="/" class="logo">e<span>S</span>ouly <small>Tools</small></a>
        <div class="header-right">
            <button class="theme-btn" onclick="toggleTheme()">
                <svg class="icon-moon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
                <svg class="icon-sun" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/></svg>
            </button>
        </div>
    </div>
</header>
<main class="tool-page">
    <div class="tool-page-header">
        <a href="/" class="back-btn" data-i18n="back_to_tools">← Back to Tools</a>
        <h1 class="tool-page-title">🔢 Word Counter</h1>
        <p class="tool-page-desc">Count words, characters, sentences and paragraphs in real-time.</p>
    </div>
    <div class="tool-box">
        <textarea class="tool-input" id="textInput" placeholder="Start typing or paste your text here..." oninput="countText()" style="min-height:240px"></textarea>
        <div class="stats-row">
            <div class="stat-box"><div class="stat-num" id="wordCount">0</div><div class="stat-label">Words</div></div>
            <div class="stat-box"><div class="stat-num" id="charCount">0</div><div class="stat-label">Characters</div></div>
            <div class="stat-box"><div class="stat-num" id="charNoSpace">0</div><div class="stat-label">No Spaces</div></div>
            <div class="stat-box"><div class="stat-num" id="sentenceCount">0</div><div class="stat-label">Sentences</div></div>
            <div class="stat-box"><div class="stat-num" id="paraCount">0</div><div class="stat-label">Paragraphs</div></div>
            <div class="stat-box"><div class="stat-num" id="readTime">0</div><div class="stat-label">Min Read</div></div>
        </div>
        <div class="btn-group">
            <button class="btn btn-secondary" onclick="document.getElementById('textInput').value='';countText()">Clear</button>
            <button class="btn btn-secondary" onclick="copyText(document.getElementById('textInput').value)">Copy Text</button>
        </div>
    </div>
</main>
<footer class="footer"><div class="footer-inner"><a href="/" class="footer-logo">e<span>S</span>ouly <small>Tools</small></a><div class="footer-links"><a href="../contact.html" data-i18n="footer_contact">Contact</a><span>·</span><a href="../privacy.html" data-i18n="footer_privacy">Privacy Policy</a><span>·</span><a href="../terms.html" data-i18n="footer_terms">Terms & Conditions</a></div><p class="footer-copy">© 2026 eSouly. All rights reserved.</p></div></footer>
<script src="../assets/js/main.js"></script>
<script src="../assets/js/tool-header.js"></script>
<script>
function countText(){
    const t = document.getElementById('textInput').value;
    const words = t.trim() === '' ? 0 : t.trim().split(/\s+/).length;
    const sentences = t === '' ? 0 : (t.match(/[.!?]+/g)||[]).length;
    const paras = t.trim() === '' ? 0 : t.trim().split(/\n\s*\n/).length;
    document.getElementById('wordCount').textContent = words;
    document.getElementById('charCount').textContent = t.length;
    document.getElementById('charNoSpace').textContent = t.replace(/\s/g,'').length;
    document.getElementById('sentenceCount').textContent = sentences;
    document.getElementById('paraCount').textContent = paras;
    document.getElementById('readTime').textContent = Math.max(1, Math.ceil(words/200));
}
</script>
<script src="../assets/js/i18n.js"></script>
</body></html>
