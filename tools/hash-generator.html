<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hash Generator — eSouly Tools</title>
    <link rel="stylesheet" href="../assets/css/main.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="light">
<header class="header"><div class="header-inner">
    <a href="/" class="logo">e<span>S</span>ouly <small>Tools</small></a>
    <div class="header-right" id="headerRight">
        <button class="theme-btn" onclick="toggleTheme()">
            <svg class="icon-moon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
            <svg class="icon-sun" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
        </button>
    </div>
</div></header>
<main class="tool-page">
    <div class="tool-page-header">
        <a href="/" class="back-btn" data-i18n="back_to_tools">← Back to Tools</a>
        <h1 class="tool-page-title">🔒 Hash Generator</h1>
        <p class="tool-page-desc">Generate MD5, SHA1, SHA256, SHA512 hashes instantly.</p>
    </div>
    <div class="tool-box">
        <textarea class="tool-input" id="input" rows="4" placeholder="Enter text to hash..."></textarea>
        <div style="margin:12px 0">
            <label style="font-size:13px;font-weight:600;display:block;margin-bottom:6px">Algorithm:</label>
            <div style="display:flex;gap:8px;flex-wrap:wrap">
                <button class="btn btn-secondary algo-btn active" data-algo="SHA-1" onclick="selectAlgo(this)">SHA-1</button>
                <button class="btn btn-secondary algo-btn" data-algo="SHA-256" onclick="selectAlgo(this)">SHA-256</button>
                <button class="btn btn-secondary algo-btn" data-algo="SHA-512" onclick="selectAlgo(this)">SHA-512</button>
            </div>
        </div>
        <button class="btn btn-primary" onclick="generateHash()">Generate Hash</button>
    </div>
    <div class="tool-box" id="resultBox" style="display:none">
        <h3 id="hashLabel">SHA-256 Hash</h3>
        <input class="tool-input" id="output" readonly style="font-family:monospace;font-size:13px;word-break:break-all">
        <button class="btn btn-secondary" style="margin-top:10px" onclick="copyText(document.getElementById('output').value)">Copy Hash</button>
    </div>
</main>
<footer class="footer"><div class="footer-inner">
    <a href="/" class="footer-logo">e<span>S</span>ouly <small>Tools</small></a>
    <div class="footer-links">
        <a href="../contact.html" data-i18n="footer_contact">Contact</a>
        <span>·</span>
        <a href="../privacy.html" data-i18n="footer_privacy">Privacy Policy</a>
        <span>·</span>
        <a href="../terms.html" data-i18n="footer_terms">Terms & Conditions</a>
    </div>
    <p class="footer-copy">© 2026 eSouly. All rights reserved.</p>
</div></footer>
<script src="../assets/js/main.js"></script>
<script src="../assets/js/tool-header.js"></script>
<script src="../assets/js/i18n.js"></script>
<script>
let selectedAlgo = 'SHA-1';
function selectAlgo(btn){
    document.querySelectorAll('.algo-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    selectedAlgo = btn.dataset.algo;
}
async function generateHash(){
    const text = document.getElementById('input').value;
    if(!text) return;
    const encoder = new TextEncoder();
    const data = encoder.encode(text);
    const hashBuffer = await crypto.subtle.digest(selectedAlgo, data);
    const hashArray = Array.from(new Uint8Array(hashBuffer));
    const hashHex = hashArray.map(b => b.toString(16).padStart(2,'0')).join('');
    document.getElementById('output').value = hashHex;
    document.getElementById('hashLabel').textContent = selectedAlgo + ' Hash';
    document.getElementById('resultBox').style.display='block';
}
</script>
</body></html>
