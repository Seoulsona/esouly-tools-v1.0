<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Word Viewer — eSouly Tools</title>
    <link rel="stylesheet" href="../assets/css/main.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>#docContent{font-size:15px;line-height:1.8;color:var(--text);padding:8px 0}#docContent h1,#docContent h2,#docContent h3{margin:16px 0 8px;color:var(--text)}#docContent p{margin-bottom:10px}#docContent table{border-collapse:collapse;width:100%;margin:12px 0}#docContent td,#docContent th{border:1px solid var(--border);padding:8px 12px}#docContent img{max-width:100%;border-radius:6px}</style>
</head>
<body class="light">
<header class="header"><div class="header-inner"><a href="/" class="logo">e<span>S</span>ouly <small>Tools</small></a><div class="header-right"><button class="theme-btn" onclick="toggleTheme()"><svg class="icon-moon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg><svg class="icon-sun" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/></svg></button></div></div></header>
<main class="tool-page">
    <div class="tool-page-header">
        <a href="/" class="back-btn" data-i18n="back_to_tools">← Back to Tools</a>
        <h1 class="tool-page-title">📘 Word Viewer</h1>
        <p class="tool-page-desc">View Word documents (.docx) directly in your browser.</p>
    </div>
    <div class="tool-box" id="uploadBox">
        <div class="drop-zone" id="dropZone" onclick="document.getElementById('fileInput').click()" ondragover="event.preventDefault();this.classList.add('drag')" ondragleave="this.classList.remove('drag')" ondrop="handleDrop(event)">
            <div class="drop-zone-icon">📘</div>
            <p>Click to select Word document</p>
            <small>Supports .docx files</small>
        </div>
        <input type="file" id="fileInput" accept=".docx" style="display:none" onchange="loadFile(this)">
    </div>
    <div class="tool-box" id="viewerBox" style="display:none">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
            <span id="fileName" style="font-size:13px;font-weight:600;color:var(--text)"></span>
            <button class="btn btn-secondary" onclick="reset()">Close</button>
        </div>
        <div style="max-height:70vh;overflow-y:auto;padding:0 4px">
            <div id="docContent"></div>
        </div>
    </div>
</main>
<footer class="footer"><div class="footer-inner"><a href="/" class="footer-logo">e<span>S</span>ouly <small>Tools</small></a><div class="footer-links"><a href="../contact.html" data-i18n="footer_contact">Contact</a><span>·</span><a href="../privacy.html" data-i18n="footer_privacy">Privacy Policy</a><span>·</span><a href="../terms.html" data-i18n="footer_terms">Terms & Conditions</a></div><p class="footer-copy">© 2026 eSouly. All rights reserved.</p></div></footer>
<script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
<script src="../assets/js/main.js"></script>
<script src="../assets/js/tool-header.js"></script>
<script>
function loadFile(input){
    const file = input.files[0];
    if(!file) return;
    const reader = new FileReader();
    reader.onload = e => {
        mammoth.convertToHtml({arrayBuffer: e.target.result})
            .then(result => {
                document.getElementById('docContent').innerHTML = result.value;
                document.getElementById('fileName').textContent = file.name;
                document.getElementById('viewerBox').style.display='block';
                document.getElementById('uploadBox').style.display='none';
            })
            .catch(() => alert('Failed to read document. Make sure it is a valid .docx file.'));
    };
    reader.readAsArrayBuffer(file);
}
function handleDrop(e){
    e.preventDefault();
    document.getElementById('dropZone').classList.remove('drag');
    const file = e.dataTransfer.files[0];
    if(file){ const dt=new DataTransfer(); dt.items.add(file); document.getElementById('fileInput').files=dt.files; loadFile(document.getElementById('fileInput')); }
}
function reset(){ document.getElementById('viewerBox').style.display='none'; document.getElementById('uploadBox').style.display='block'; document.getElementById('fileInput').value=''; }
</script>
<script src="../assets/js/i18n.js"></script>
</body></html>
