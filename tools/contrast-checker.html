<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Color Contrast Checker — eSouly Tools</title>
    <link rel="stylesheet" href="../assets/css/main.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="light">
<header class="header"><div class="header-inner">
    <a href="/" class="logo">e<span>S</span>ouly <small>Tools</small></a>
    <div class="header-right" id="headerRight">
        <button class="theme-btn" onclick="toggleTheme()">
            <svg class="icon-moon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
            <svg class="icon-sun" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
        </button>
    </div>
</div></header>
<main class="tool-page">
    <div class="tool-page-header">
        <a href="/" class="back-btn" data-i18n="back_to_tools">← Back to Tools</a>
        <h1 class="tool-page-title">👁️ Color Contrast Checker</h1>
        <p class="tool-page-desc">Check WCAG accessibility contrast ratios.</p>
    </div>
    <div class="tool-box">
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px">
            <div>
                <label style="font-size:13px;font-weight:600;display:block;margin-bottom:6px">Foreground (Text):</label>
                <div style="display:flex;gap:8px">
                    <input type="color" id="fg" value="#000000" oninput="check()" style="width:50px;height:40px;border:none;cursor:pointer;border-radius:6px">
                    <input class="tool-input" id="fgHex" value="#000000" style="font-family:monospace" oninput="syncFg()">
                </div>
            </div>
            <div>
                <label style="font-size:13px;font-weight:600;display:block;margin-bottom:6px">Background:</label>
                <div style="display:flex;gap:8px">
                    <input type="color" id="bg" value="#ffffff" oninput="check()" style="width:50px;height:40px;border:none;cursor:pointer;border-radius:6px">
                    <input class="tool-input" id="bgHex" value="#ffffff" style="font-family:monospace" oninput="syncBg()">
                </div>
            </div>
        </div>
        <div id="previewBox" style="padding:24px;border-radius:8px;margin-bottom:16px;border:1px solid var(--border);background:#fff">
            <p id="sampleLarge" style="font-size:24px;font-weight:700;margin-bottom:8px">Large Text Sample (18pt Bold)</p>
            <p id="sampleSmall" style="font-size:14px">Small text sample — The quick brown fox jumps over the lazy dog.</p>
        </div>
        <div id="results"></div>
    </div>
</main>
<footer class="footer"><div class="footer-inner">
    <a href="/" class="footer-logo">e<span>S</span>ouly <small>Tools</small></a>
    <div class="footer-links">
        <a href="../contact.html" data-i18n="footer_contact">Contact</a>
        <span>·</span>
        <a href="../privacy.html" data-i18n="footer_privacy">Privacy Policy</a>
        <span>·</span>
        <a href="../terms.html" data-i18n="footer_terms">Terms & Conditions</a>
    </div>
    <p class="footer-copy">© 2026 eSouly. All rights reserved.</p>
</div></footer>
<script src="../assets/js/main.js"></script>
<script src="../assets/js/tool-header.js"></script>
<script src="../assets/js/i18n.js"></script>
<script>
function hexToRgb(hex){ const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16); return[r,g,b]; }
function luminance([r,g,b]){ return[r,g,b].reduce((a,v,i)=>{v/=255;v=v<=.03928?v/12.92:((v+.055)/1.055)**2.4;return a+(v*[.2126,.7152,.0722][i]);},0); }
function syncFg(){ const h=document.getElementById('fgHex').value; if(/^#[0-9a-f]{6}$/i.test(h)){document.getElementById('fg').value=h; check();} }
function syncBg(){ const h=document.getElementById('bgHex').value; if(/^#[0-9a-f]{6}$/i.test(h)){document.getElementById('bg').value=h; check();} }
function check(){
    const fg=document.getElementById('fg').value, bg=document.getElementById('bg').value;
    document.getElementById('fgHex').value=fg; document.getElementById('bgHex').value=bg;
    const pb=document.getElementById('previewBox');
    pb.style.background=bg;
    document.getElementById('sampleLarge').style.color=fg;
    document.getElementById('sampleSmall').style.color=fg;
    const L1=luminance(hexToRgb(fg)), L2=luminance(hexToRgb(bg));
    const ratio=(Math.max(L1,L2)+.05)/(Math.min(L1,L2)+.05);
    const r=ratio.toFixed(2);
    const aaLarge=ratio>=3, aaSmall=ratio>=4.5, aaaLarge=ratio>=4.5, aaaSmall=ratio>=7;
    const badge=(pass,label)=>`<span style="padding:4px 10px;border-radius:20px;font-size:12px;font-weight:600;background:${pass?'#22c55e':'#ef4444'};color:white">${pass?'PASS':'FAIL'} ${label}</span>`;
    document.getElementById('results').innerHTML=`
        <div style="text-align:center;margin-bottom:16px">
            <div style="font-size:40px;font-weight:700">${r}:1</div>
            <div style="font-size:13px;color:var(--text2)">Contrast Ratio</div>
        </div>
        <div style="display:flex;gap:8px;flex-wrap:wrap;justify-content:center">
            ${badge(aaSmall,'AA Normal')}${badge(aaLarge,'AA Large')}${badge(aaaSmall,'AAA Normal')}${badge(aaaLarge,'AAA Large')}
        </div>`;
}
document.getElementById('fg').addEventListener('input',e=>{document.getElementById('fgHex').value=e.target.value;check();});
document.getElementById('bg').addEventListener('input',e=>{document.getElementById('bgHex').value=e.target.value;check();});
check();
</script>
</body></html>
