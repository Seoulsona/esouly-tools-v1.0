<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hex ↔ RGB Converter — eSouly Tools</title>
    <link rel="stylesheet" href="../assets/css/main.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="light">
<header class="header"><div class="header-inner"><a href="/" class="logo">e<span>S</span>ouly <small>Tools</small></a><div class="header-right"><button class="theme-btn" onclick="toggleTheme()"><svg class="icon-moon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg><svg class="icon-sun" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/></svg></button></div></div></header>
<main class="tool-page">
    <div class="tool-page-header">
        <a href="/" class="back-btn" data-i18n="back_to_tools">← Back to Tools</a>
        <h1 class="tool-page-title">🖌️ Hex ↔ RGB Converter</h1>
        <p class="tool-page-desc">Convert between HEX, RGB, and HSL color codes instantly.</p>
    </div>
    <div class="tool-box">
        <div style="display:flex;align-items:center;gap:16px;margin-bottom:20px">
            <input type="color" id="colorPicker" value="#E24B4A" oninput="fromPicker(this.value)" style="width:64px;height:64px;border:none;border-radius:10px;cursor:pointer;background:none">
            <div>
                <div style="font-size:13px;font-weight:600;color:var(--text);margin-bottom:4px">Pick a Color</div>
                <div style="font-size:12px;color:var(--text3)">Click the color swatch to open picker</div>
            </div>
        </div>
        <div style="display:grid;gap:12px">
            <div>
                <label style="font-size:13px;font-weight:600;color:var(--text);display:block;margin-bottom:6px">HEX</label>
                <input type="text" class="tool-input" id="hexInput" value="#E24B4A" placeholder="#ffffff" oninput="fromHex(this.value)">
            </div>
            <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px">
                <div><label style="font-size:12px;color:var(--text3);display:block;margin-bottom:4px">R</label><input type="number" class="tool-input" id="rInput" min="0" max="255" value="226" oninput="fromRGB()"></div>
                <div><label style="font-size:12px;color:var(--text3);display:block;margin-bottom:4px">G</label><input type="number" class="tool-input" id="gInput" min="0" max="255" value="75" oninput="fromRGB()"></div>
                <div><label style="font-size:12px;color:var(--text3);display:block;margin-bottom:4px">B</label><input type="number" class="tool-input" id="bInput" min="0" max="255" value="74" oninput="fromRGB()"></div>
            </div>
            <div>
                <label style="font-size:13px;font-weight:600;color:var(--text);display:block;margin-bottom:6px">HSL</label>
                <input type="text" class="tool-input" id="hslOutput" value="hsl(0, 74%, 59%)" readonly>
            </div>
            <div>
                <label style="font-size:13px;font-weight:600;color:var(--text);display:block;margin-bottom:6px">CSS RGB</label>
                <input type="text" class="tool-input" id="rgbOutput" value="rgb(226, 75, 74)" readonly>
            </div>
        </div>
        <div class="btn-group" style="margin-top:12px">
            <button class="btn btn-secondary" onclick="copyText(document.getElementById('hexInput').value)">Copy HEX</button>
            <button class="btn btn-secondary" onclick="copyText(document.getElementById('rgbOutput').value)">Copy RGB</button>
            <button class="btn btn-secondary" onclick="copyText(document.getElementById('hslOutput').value)">Copy HSL</button>
        </div>
    </div>
</main>
<footer class="footer"><div class="footer-inner"><a href="/" class="footer-logo">e<span>S</span>ouly <small>Tools</small></a><div class="footer-links"><a href="../contact.html" data-i18n="footer_contact">Contact</a><span>·</span><a href="../privacy.html" data-i18n="footer_privacy">Privacy Policy</a><span>·</span><a href="../terms.html" data-i18n="footer_terms">Terms & Conditions</a></div><p class="footer-copy">© 2026 eSouly. All rights reserved.</p></div></footer>
<script src="../assets/js/main.js"></script>
<script src="../assets/js/tool-header.js"></script>
<script>
function hexToRgb(hex){
    hex=hex.replace('#','');
    if(hex.length===3) hex=hex.split('').map(c=>c+c).join('');
    const n=parseInt(hex,16);
    return{r:(n>>16)&255,g:(n>>8)&255,b:n&255};
}
function rgbToHex(r,g,b){ return '#'+[r,g,b].map(v=>v.toString(16).padStart(2,'0')).join(''); }
function rgbToHsl(r,g,b){
    r/=255;g/=255;b/=255;
    const max=Math.max(r,g,b),min=Math.min(r,g,b);
    let h,s,l=(max+min)/2;
    if(max===min){h=s=0}else{
        const d=max-min;s=l>0.5?d/(2-max-min):d/(max+min);
        switch(max){case r:h=(g-b)/d+(g<b?6:0);break;case g:h=(b-r)/d+2;break;case b:h=(r-g)/d+4;break}
        h/=6;
    }
    return{h:Math.round(h*360),s:Math.round(s*100),l:Math.round(l*100)};
}
function updateAll(r,g,b){
    const hex=rgbToHex(r,g,b);
    const hsl=rgbToHsl(r,g,b);
    document.getElementById('hexInput').value=hex;
    document.getElementById('rInput').value=r;
    document.getElementById('gInput').value=g;
    document.getElementById('bInput').value=b;
    document.getElementById('rgbOutput').value=`rgb(${r}, ${g}, ${b})`;
    document.getElementById('hslOutput').value=`hsl(${hsl.h}, ${hsl.s}%, ${hsl.l}%)`;
    document.getElementById('colorPicker').value=hex;
}
function fromHex(hex){
    if(/^#?[0-9A-Fa-f]{6}$/.test(hex)||/^#?[0-9A-Fa-f]{3}$/.test(hex)){
        const {r,g,b}=hexToRgb(hex);updateAll(r,g,b);
    }
}
function fromRGB(){
    const r=Math.min(255,Math.max(0,parseInt(document.getElementById('rInput').value)||0));
    const g=Math.min(255,Math.max(0,parseInt(document.getElementById('gInput').value)||0));
    const b=Math.min(255,Math.max(0,parseInt(document.getElementById('bInput').value)||0));
    updateAll(r,g,b);
}
function fromPicker(hex){ const{r,g,b}=hexToRgb(hex);updateAll(r,g,b); }
</script>
<script src="../assets/js/i18n.js"></script>
</body></html>
