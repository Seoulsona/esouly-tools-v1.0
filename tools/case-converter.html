<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Case Converter — eSouly Tools</title>
    <link rel="stylesheet" href="../assets/css/main.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="light">
<header class="header"><div class="header-inner"><a href="/" class="logo">e<span>S</span>ouly <small>Tools</small></a><div class="header-right"><button class="theme-btn" onclick="toggleTheme()"><svg class="icon-moon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg><svg class="icon-sun" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/></svg></button></div></div></header>
<main class="tool-page">
    <div class="tool-page-header">
        <a href="/" class="back-btn" data-i18n="back_to_tools">← Back to Tools</a>
        <h1 class="tool-page-title">🔡 Case Converter</h1>
        <p class="tool-page-desc">Convert text to uppercase, lowercase, title case, camelCase and more.</p>
    </div>
    <div class="tool-box">
        <textarea class="tool-input" id="input" placeholder="Type or paste your text here..." style="min-height:160px"></textarea>
        <div class="btn-group" style="margin-top:12px">
            <button class="btn btn-secondary" onclick="convert('upper')">UPPERCASE</button>
            <button class="btn btn-secondary" onclick="convert('lower')">lowercase</button>
            <button class="btn btn-secondary" onclick="convert('title')">Title Case</button>
            <button class="btn btn-secondary" onclick="convert('sentence')">Sentence case</button>
            <button class="btn btn-secondary" onclick="convert('camel')">camelCase</button>
            <button class="btn btn-secondary" onclick="convert('snake')">snake_case</button>
            <button class="btn btn-secondary" onclick="convert('kebab')">kebab-case</button>
            <button class="btn btn-secondary" onclick="convert('alternate')">aLtErNaTe</button>
        </div>
    </div>
    <div class="tool-box" id="resultBox" style="display:none">
        <h3>Result</h3>
        <div class="result-box" id="result"></div>
        <div class="btn-group">
            <button class="btn btn-primary" onclick="copyText(document.getElementById('result').textContent)">Copy Result</button>
            <button class="btn btn-secondary" onclick="document.getElementById('input').value=document.getElementById('result').textContent">Use as Input</button>
        </div>
    </div>
</main>
<footer class="footer"><div class="footer-inner"><a href="/" class="footer-logo">e<span>S</span>ouly <small>Tools</small></a><div class="footer-links"><a href="../contact.html" data-i18n="footer_contact">Contact</a><span>·</span><a href="../privacy.html" data-i18n="footer_privacy">Privacy Policy</a><span>·</span><a href="../terms.html" data-i18n="footer_terms">Terms & Conditions</a></div><p class="footer-copy">© 2026 eSouly. All rights reserved.</p></div></footer>
<script src="../assets/js/main.js"></script>
<script src="../assets/js/tool-header.js"></script>
<script>
function convert(type){
    const t = document.getElementById('input').value;
    if(!t.trim()) return;
    let r = '';
    switch(type){
        case 'upper': r = t.toUpperCase(); break;
        case 'lower': r = t.toLowerCase(); break;
        case 'title': r = t.replace(/\w\S*/g, w => w.charAt(0).toUpperCase()+w.slice(1).toLowerCase()); break;
        case 'sentence': r = t.toLowerCase().replace(/(^\s*\w|[.!?]\s*\w)/g, c => c.toUpperCase()); break;
        case 'camel': r = t.toLowerCase().replace(/[^a-zA-Z0-9]+(.)/g, (_,c) => c.toUpperCase()); break;
        case 'snake': r = t.toLowerCase().replace(/\s+/g,'_').replace(/[^a-z0-9_]/g,''); break;
        case 'kebab': r = t.toLowerCase().replace(/\s+/g,'-').replace(/[^a-z0-9-]/g,''); break;
        case 'alternate': r = t.split('').map((c,i) => i%2===0?c.toLowerCase():c.toUpperCase()).join(''); break;
    }
    document.getElementById('result').textContent = r;
    document.getElementById('resultBox').style.display = 'block';
}
</script>
<script src="../assets/js/i18n.js"></script>
</body></html>
