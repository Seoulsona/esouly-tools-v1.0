<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Gradient Generator — eSouly Tools</title>
    <link rel="stylesheet" href="../assets/css/main.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="light">
<header class="header"><div class="header-inner">
    <a href="/" class="logo">e<span>S</span>ouly <small>Tools</small></a>
    <div class="header-right" id="headerRight">
        <button class="theme-btn" onclick="toggleTheme()">
            <svg class="icon-moon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
            <svg class="icon-sun" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
        </button>
    </div>
</div></header>
<main class="tool-page">
    <div class="tool-page-header">
        <a href="/" class="back-btn" data-i18n="back_to_tools">← Back to Tools</a>
        <h1 class="tool-page-title">🌈 CSS Gradient Generator</h1>
        <p class="tool-page-desc">Create beautiful CSS gradients visually.</p>
    </div>
    <div class="tool-box">
        <div style="display:flex;gap:12px;flex-wrap:wrap;margin-bottom:16px;align-items:end">
            <div>
                <label style="font-size:13px;font-weight:600;display:block;margin-bottom:6px">Type:</label>
                <select class="tool-input" id="gradType" onchange="updateGrad()" style="width:130px">
                    <option value="linear">Linear</option>
                    <option value="radial">Radial</option>
                    <option value="conic">Conic</option>
                </select>
            </div>
            <div id="angleBox">
                <label style="font-size:13px;font-weight:600;display:block;margin-bottom:6px">Angle: <span id="angleVal">135</span>°</label>
                <input type="range" id="angle" min="0" max="360" value="135" oninput="document.getElementById('angleVal').textContent=this.value;updateGrad()">
            </div>
        </div>
        <div style="display:flex;gap:12px;margin-bottom:16px;flex-wrap:wrap">
            <div>
                <label style="font-size:13px;font-weight:600;display:block;margin-bottom:6px">Color 1:</label>
                <input type="color" id="c1" value="#667eea" oninput="updateGrad()" style="width:50px;height:40px;border:none;cursor:pointer;border-radius:6px">
            </div>
            <div>
                <label style="font-size:13px;font-weight:600;display:block;margin-bottom:6px">Color 2:</label>
                <input type="color" id="c2" value="#764ba2" oninput="updateGrad()" style="width:50px;height:40px;border:none;cursor:pointer;border-radius:6px">
            </div>
        </div>
        <div id="preview" style="height:160px;border-radius:12px;margin-bottom:16px;border:1px solid var(--border)"></div>
        <div>
            <label style="font-size:13px;font-weight:600;display:block;margin-bottom:6px">CSS Code:</label>
            <div style="display:flex;gap:8px">
                <input class="tool-input" id="cssOutput" readonly style="font-family:monospace;font-size:12px;flex:1">
                <button class="btn btn-primary" onclick="copyText(document.getElementById('cssOutput').value)">Copy</button>
            </div>
        </div>
    </div>
</main>
<footer class="footer"><div class="footer-inner">
    <a href="/" class="footer-logo">e<span>S</span>ouly <small>Tools</small></a>
    <div class="footer-links">
        <a href="../contact.html" data-i18n="footer_contact">Contact</a>
        <span>·</span>
        <a href="../privacy.html" data-i18n="footer_privacy">Privacy Policy</a>
        <span>·</span>
        <a href="../terms.html" data-i18n="footer_terms">Terms & Conditions</a>
    </div>
    <p class="footer-copy">© 2026 eSouly. All rights reserved.</p>
</div></footer>
<script src="../assets/js/main.js"></script>
<script src="../assets/js/tool-header.js"></script>
<script src="../assets/js/i18n.js"></script>
<script>
function updateGrad(){
    const type=document.getElementById('gradType').value;
    const c1=document.getElementById('c1').value, c2=document.getElementById('c2').value;
    const angle=document.getElementById('angle').value;
    document.getElementById('angleBox').style.display=type==='radial'?'none':'block';
    let css;
    if(type==='linear') css=`linear-gradient(${angle}deg, ${c1}, ${c2})`;
    else if(type==='radial') css=`radial-gradient(circle, ${c1}, ${c2})`;
    else css=`conic-gradient(from ${angle}deg, ${c1}, ${c2}, ${c1})`;
    document.getElementById('preview').style.background=css;
    document.getElementById('cssOutput').value=`background: ${css};`;
}
updateGrad();
</script>
</body></html>
