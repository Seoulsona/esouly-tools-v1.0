<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JSON Formatter — eSouly Tools</title>
    <link rel="stylesheet" href="../assets/css/main.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>.json-output{font-family:monospace;font-size:13px;white-space:pre-wrap;word-break:break-all;min-height:200px;padding:14px;background:var(--bg2);border:1px solid var(--border);border-radius:8px;color:var(--text);overflow:auto}.json-key{color:#0070f3}.json-string{color:#e25c00}.json-number{color:#16a34a}.json-bool{color:#9333ea}.json-null{color:#dc2626}.error-msg{color:#dc2626;font-size:13px;padding:8px;background:rgba(220,38,38,.1);border-radius:6px;margin-top:8px}</style>
</head>
<body class="light">
<header class="header"><div class="header-inner"><a href="/" class="logo">e<span>S</span>ouly <small>Tools</small></a><div class="header-right"><button class="theme-btn" onclick="toggleTheme()"><svg class="icon-moon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg><svg class="icon-sun" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/></svg></button></div></div></header>
<main class="tool-page">
    <div class="tool-page-header">
        <a href="/" class="back-btn" data-i18n="back_to_tools">← Back to Tools</a>
        <h1 class="tool-page-title">📋 JSON Formatter</h1>
        <p class="tool-page-desc">Format, validate and beautify JSON with syntax highlighting.</p>
    </div>
    <div class="tool-box">
        <h3>Input JSON</h3>
        <textarea class="tool-input" id="input" placeholder='{"name":"eSouly","type":"tools","version":2}' style="min-height:160px;font-family:monospace;font-size:13px"></textarea>
        <div class="btn-group">
            <button class="btn btn-primary" onclick="format()">Format JSON</button>
            <button class="btn btn-secondary" onclick="minify()">Minify</button>
            <button class="btn btn-secondary" onclick="validate()">Validate</button>
            <button class="btn btn-secondary" onclick="document.getElementById('input').value='';document.getElementById('output').innerHTML='';document.getElementById('err').textContent=''">Clear</button>
        </div>
        <div id="err"></div>
    </div>
    <div class="tool-box">
        <h3>Output</h3>
        <div class="json-output" id="output"></div>
        <div class="btn-group">
            <button class="btn btn-secondary" onclick="copyText(document.getElementById('input').value)">Copy Formatted</button>
        </div>
    </div>
</main>
<footer class="footer"><div class="footer-inner"><a href="/" class="footer-logo">e<span>S</span>ouly <small>Tools</small></a><div class="footer-links"><a href="../contact.html" data-i18n="footer_contact">Contact</a><span>·</span><a href="../privacy.html" data-i18n="footer_privacy">Privacy Policy</a><span>·</span><a href="../terms.html" data-i18n="footer_terms">Terms & Conditions</a></div><p class="footer-copy">© 2026 eSouly. All rights reserved.</p></div></footer>
<script src="../assets/js/main.js"></script>
<script src="../assets/js/tool-header.js"></script>
<script>
function format(){
    const err = document.getElementById('err');
    try {
        const parsed = JSON.parse(document.getElementById('input').value);
        const formatted = JSON.stringify(parsed, null, 2);
        document.getElementById('input').value = formatted;
        document.getElementById('output').innerHTML = highlight(formatted);
        err.textContent = '';
    } catch(e) {
        err.innerHTML = '<div class="error-msg">❌ Invalid JSON: ' + e.message + '</div>';
    }
}
function minify(){
    const err = document.getElementById('err');
    try {
        const parsed = JSON.parse(document.getElementById('input').value);
        const minified = JSON.stringify(parsed);
        document.getElementById('input').value = minified;
        document.getElementById('output').textContent = minified;
        err.textContent = '';
    } catch(e) {
        err.innerHTML = '<div class="error-msg">❌ Invalid JSON: ' + e.message + '</div>';
    }
}
function validate(){
    const err = document.getElementById('err');
    try {
        JSON.parse(document.getElementById('input').value);
        err.innerHTML = '<div style="color:#16a34a;font-size:13px;padding:8px;background:rgba(22,163,74,.1);border-radius:6px;margin-top:8px">✅ Valid JSON!</div>';
    } catch(e) {
        err.innerHTML = '<div class="error-msg">❌ Invalid JSON: ' + e.message + '</div>';
    }
}
function highlight(json){
    return json.replace(/("(\\u[a-zA-Z0-9]{4}|\\[^u]|[^\\"])*"(\s*:)?|\b(true|false|null)\b|-?\d+(?:\.\d*)?(?:[eE][+\-]?\d+)?)/g, match => {
        let cls = 'json-number';
        if(/^"/.test(match)){
            cls = /:$/.test(match) ? 'json-key' : 'json-string';
        } else if(/true|false/.test(match)){
            cls = 'json-bool';
        } else if(/null/.test(match)){
            cls = 'json-null';
        }
        return '<span class="'+cls+'">'+match+'</span>';
    });
}
</script>
<script src="../assets/js/i18n.js"></script>
</body></html>
